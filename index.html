<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kimmelman House — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --fg: #1a1a1a;
    --muted: #666;
    --gap: 26px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Work Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 24px 40px;
    background: rgba(250, 249, 246, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid transparent;
    z-index: 100;
    transition: padding 0.4s var(--ease), background 0.4s var(--ease), border-color 0.4s var(--ease);
  }
  header.scrolled {
    padding: 16px 40px;
    background: rgba(250, 249, 246, 0.94);
    border-bottom-color: rgba(0,0,0,0.07);
  }
  header .brand {
    font-family: "Comfortaa", "Work Sans", sans-serif;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 0.005em;
    white-space: nowrap;
    text-align: center;
  }
  header nav.left { justify-self: start; }
  header .ig { justify-self: end; }
  header .ig {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    color: var(--fg);
    transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
  }
  header .ig:hover { opacity: 0.6; transform: scale(1.08); }
  header .ig svg { width: 100%; height: 100%; }
  header nav ul {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  header nav a {
    position: relative;
    color: var(--fg);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.05em;
    padding-bottom: 2px;
  }
  header nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--fg);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.5s var(--ease);
  }
  header nav a:hover::after {
    transform: scaleX(1);
    transform-origin: left;
  }

  main { padding: 120px 20px 60px; }

  /* Section title */
  .section-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
    padding-bottom: 14px;
    position: relative;
  }
  .section-title::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 40px;
    height: 1px;
    background: rgba(0,0,0,0.25);
  }

  /* Gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    align-items: start;
  }
  .gallery img {
    width: 100%;
    height: auto;
    aspect-ratio: 3 / 2;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
    filter: brightness(0.97) saturate(0.97);
    transition: transform 0.7s var(--ease), opacity 0.9s var(--ease), filter 0.6s var(--ease);
  }
  .gallery img:hover {
    transform: scale(1.015);
    filter: brightness(1.03) saturate(1.02);
  }

  /* About section */
  .about {
    max-width: 1100px;
    margin: 140px auto 60px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 60px;
    align-items: start;
  }
  .about .portrait {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 2px;
    background: #ededed;
  }
  .about .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 1.2s var(--ease);
  }
  .about .portrait:hover img { transform: scale(1.05); }
  .about h2 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .about .role {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .about p {
    font-size: 15px;
    line-height: 1.75;
    color: #333;
    margin-bottom: 18px;
  }
  .about .locations {
    margin-top: 24px;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Reveal-on-scroll */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
    will-change: opacity, transform;
  }
  .reveal.visible {
    opacity: 1;
    transform: none;
  }
  .gallery img.reveal { transition-delay: var(--d, 0s); }

  footer {
    padding: 140px 40px 60px;
    text-align: center;
    color: var(--muted);
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 80px;
  }
  footer .footer-brand {
    font-family: "Comfortaa", "Work Sans", sans-serif;
    font-weight: 400;
    font-size: clamp(48px, 9vw, 130px);
    letter-spacing: -0.01em;
    color: var(--fg);
    line-height: 1.05;
    margin-bottom: 60px;
  }
  footer .footer-actions {
    display: flex;
    gap: 28px;
    justify-content: center;
    margin-bottom: 50px;
    flex-wrap: wrap;
  }
  footer .footer-actions a {
    display: inline-block;
    padding: 18px 56px;
    border: 1px solid var(--fg);
    color: var(--fg);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    transition: background 0.4s var(--ease), color 0.4s var(--ease);
  }
  footer .footer-actions a:hover {
    background: var(--fg);
    color: var(--bg);
  }
  footer .footer-ig {
    display: inline-flex;
    width: 24px;
    height: 24px;
    color: var(--fg);
    margin-bottom: 60px;
    transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
  }
  footer .footer-ig:hover { opacity: 0.6; transform: scale(1.08); }
  footer .footer-ig svg { width: 100%; height: 100%; }
  footer .credit {
    display: block;
    font-size: 12px;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  footer .copy {
    display: block;
    opacity: 0.6;
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  @media (max-width: 700px) {
    footer { padding: 90px 20px 40px; }
    footer .footer-brand { margin-bottom: 40px; }
    footer .footer-actions a { padding: 16px 40px; }
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    cursor: zoom-out;
    padding: 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s var(--ease);
  }
  .lightbox.open {
    opacity: 1;
    pointer-events: auto;
  }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transform: scale(0.96);
    transition: transform 0.5s var(--ease);
  }
  .lightbox.open img { transform: scale(1); }
  .lightbox button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s var(--ease), transform 0.3s var(--ease);
  }
  .lightbox button:hover { background: rgba(255,255,255,0.18); }
  .lightbox .prev { left: 30px; }
  .lightbox .next { right: 30px; }
  @media (max-width: 700px) {
    .lightbox .prev { left: 12px; }
    .lightbox .next { right: 12px; }
    .lightbox button { width: 40px; height: 40px; }
  }

  /* Page intro fade */
  .page-fade {
    animation: fadeUp 1.1s var(--ease) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: none; }
  }

  @media (max-width: 1100px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
    .about { grid-template-columns: 240px 1fr; gap: 40px; }
  }
  @media (max-width: 700px) {
    header { padding: 18px 20px; }
    header.scrolled { padding: 14px 20px; }
    header nav ul { gap: 18px; }
    main { padding: 90px 20px 40px; }
    .gallery { grid-template-columns: 1fr; }
    .about {
      grid-template-columns: 1fr;
      gap: 28px;
      margin: 80px auto 40px;
    }
    .about .portrait { max-width: 240px; }
    .about h2 { font-size: 26px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .reveal { opacity: 1; transform: none; }
  }
</style>
</head>

  <img id="lightbox-img" src="" alt="">
  <button class="next" aria-label="Next">›</button>
</div>

<script>
  // Header scroll state
  const header = document.getElementById('site-header');
  const onScroll = () => header.classList.toggle('scrolled', window.scrollY > 20);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  // Reveal on scroll with stagger
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach((el, i) => {
    if (el.tagName === 'IMG' && el.closest('.gallery')) {
      const col = i % 3;
      el.style.setProperty('--d', (col * 0.08) + 's');
    }
    io.observe(el);
  });

  // Lightbox with prev/next
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const prevBtn = lightbox.querySelector('.prev');
  const nextBtn = lightbox.querySelector('.next');
  const galleryImgs = Array.from(document.querySelectorAll('.gallery img'));
  let currentIdx = 0;

  const showAt = (idx) => {
    currentIdx = (idx + galleryImgs.length) % galleryImgs.length;
    lightboxImg.src = galleryImgs[currentIdx].src;
  };

  galleryImgs.forEach((img, i) => {
    img.addEventListener('click', () => {
      showAt(i);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });

  const closeLb = () => {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  };

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target === lightboxImg) closeLb();
  });
  prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showAt(currentIdx - 1); });
  nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showAt(currentIdx + 1); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') showAt(currentIdx - 1);
    if (e.key === 'ArrowRight') showAt(currentIdx + 1);
  });
</script>
